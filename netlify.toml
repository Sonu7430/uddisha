[build]
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_ENABLED = "false"
  NPM_FLAGS = "--legacy-peer-deps --include=dev"

# Legacy URL 301 redirects - fix "Alternate page with proper canonical tag" issue
# These MUST come BEFORE the SPA fallback
[[redirects]]
  from = "/terms"
  to = "/terms-of-service"
  status = 301
  force = true

[[redirects]]
  from = "/blog/healthcare"
  to = "/blog/healthcare-careers-2025"
  status = 301
  force = true

[[redirects]]
  from = "/blog/emerging-careers"
  to = "/blog/top-careers-india"
  status = 301
  force = true

[[redirects]]
  from = "/blog/career-after-12th"
  to = "/blog/right-career-path-after-12th"
  status = 301
  force = true

[[redirects]]
  from = "/questionnaire"
  to = "/assessment"
  status = 301
  force = true

[[redirects]]
  from = "/explorer"
  to = "/careers"
  status = 301
  force = true

[[redirects]]
  from = "/assistant"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/community"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/blog/global-stream-systems"
  to = "/blog"
  status = 301
  force = true

# SPA fallback - catch all for client-side routing (MUST BE LAST)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer-when-downgrade"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self' https: data: 'unsafe-inline' 'unsafe-eval'; script-src 'self' https: 'unsafe-inline' 'unsafe-eval'; frame-src 'self'; connect-src 'self' https:; img-src 'self' https: data: blob:; font-src 'self' https: data:; frame-ancestors 'self';"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Netlify Functions configuration
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."career-analysis"]
  timeout = 60

[functions."submit-feedback"]
  timeout = 10

[functions."get-careers"]
  timeout = 10
