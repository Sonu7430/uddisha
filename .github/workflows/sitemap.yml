name: Auto Sitemap Generator

on:
  push:
    paths:
      - 'blog/**'          # triggers when any file in the blog folder changes
      - 'sitemap.js'       # triggers when the generator script is modified
      - 'auto-sitemap.js'  # also watches your automation script if you use it

jobs:
  generate-sitemap:
    runs-on: ubuntu-latest

    steps:
      - name: 🛎️ Checkout your repo
        uses: actions/checkout@v3

      - name: 🧰 Install dependencies
        run: npm install

      - name: ⚙️ Run sitemap generator
        run: node auto-sitemap.js

      - name: 🚀 Deploy updated sitemap (Optional step)
        if: success()
        run: echo "Ready to integrate with Netlify deploy hook or other service"
